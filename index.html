<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIB Tram Departures - Stop 6805F</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .departure {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f5f5f5;
            border-radius: 10px;
            border-left: 5px solid #2a5298;
        }

        .departure-info {
            flex: 1;
        }

        .line-number {
            font-size: 28px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 5px;
        }

        .destination {
            font-size: 16px;
            color: #333;
            margin-bottom: 3px;
        }

        .departure-time {
            font-size: 14px;
            color: #666;
        }

        .time-badge {
            background: #2a5298;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            min-width: 70px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2a5298;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 10px;
            text-align: center;
        }

        .footer {
            background: #f5f5f5;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .refresh-info {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚊 STIB Departures</h1>
            <p>Stop 6805F</p>
        </div>

        <div class="content" id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading tram times...</p>
            </div>
        </div>

        <div class="footer">
            <div class="refresh-info">Auto-refreshing every 30 seconds</div>
        </div>
    </div>

    <script>
        const STOP_ID = '6805F';
        const REFRESH_INTERVAL = 30000; // 30 seconds

        async function fetchDepartures() {
            try {
                // Using the public endpoint (no authentication required)
                const url = `https://stibmivb.opendatasoft.com/api/explore/v2.1/catalog/datasets/waiting-time-rt/records?refine=stop_id:${STOP_ID}&limit=20`;

                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                displayDepartures(data.results);
            } catch (error) {
                console.error('Error fetching data:', error);
                displayError(error.message);
            }
        }

        function displayDepartures(results) {
            const contentDiv = document.getElementById('content');

            if (!results || results.length === 0) {
                contentDiv.innerHTML = '<div class="error">No departures found</div>';
                return;
            }

            // Group by line and destination
            const grouped = {};
            results.forEach(item => {
                const key = `${item.line_id}-${item.destination}`;
                if (!grouped[key]) {
                    grouped[key] = [];
                }
                grouped[key].push(item);
            });

            // Sort and create HTML
            let html = '';
            Object.keys(grouped).forEach(key => {
                const items = grouped[key];
                const first = items[0];

                // Extract waiting time in minutes
                const waitingTime = first.waiting_time_rt || 'N/A';

                html += `
                    <div class="departure">
                        <div class="departure-info">
                            <div class="line-number">${first.line_id}</div>
                            <div class="destination">${first.destination || 'Unknown'}</div>
                            <div class="departure-time">Line ${first.line_id}</div>
                        </div>
                        <div class="time-badge">${waitingTime}m</div>
                    </div>
                `;
            });

            if (html) {
                contentDiv.innerHTML = html;
            } else {
                contentDiv.innerHTML = '<div class="error">Unable to parse departure data</div>';
            }
        }

        function displayError(message) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = `
                <div class="error">
                    <p>⚠️ Error loading departures</p>
                    <p>${message}</p>
                    <p style="margin-top: 10px; font-size: 12px;">Retrying in 30 seconds...</p>
                </div>
            `;
        }

        // Initial fetch
        fetchDepartures();

        // Auto-refresh every 30 seconds
        setInterval(fetchDepartures, REFRESH_INTERVAL);
    </script>
</body>
</html>
